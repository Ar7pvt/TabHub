<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoicely</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/invoice.css">
</head>
<body class="text-slate-800">

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 no-print">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-indigo-50 p-3 rounded-xl text-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Total Revenue</p>
                    <h3 class="text-2xl font-bold text-slate-900" id="totalRevenue">$0.00</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-violet-50 p-3 rounded-xl text-violet-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Average Invoice</p>
                    <h3 class="text-2xl font-bold text-slate-900" id="avgInvoice">$0.00</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-xl text-blue-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Total Invoices</p>
                    <h3 class="text-2xl font-bold text-slate-900" id="invoiceCount">0</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Column -->
            <div class="lg:col-span-7">
                <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                    <h2 class="text-2xl font-bold mb-6">Create New Invoice</h2>

                    <form id="invoiceForm" class="space-y-6">
                        <!-- Company & Client Info -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-4">
                                <h3 class="text-xs font-bold text-indigo-600 uppercase tracking-widest">From (Company)</h3>
                                <input type="text" id="companyName" required placeholder="Your Company Name" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500">
                                <textarea id="companyAddress" rows="3" required placeholder="Company Address" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 resize-none"></textarea>
                            </div>
                            <div class="space-y-4">
                                <h3 class="text-xs font-bold text-violet-600 uppercase tracking-widest">To (Client)</h3>
                                <input type="text" id="clientName" required placeholder="Client Name" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-violet-100 focus:border-violet-500">
                                <textarea id="clientAddress" rows="3" required placeholder="Client Address" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-violet-100 focus:border-violet-500 resize-none"></textarea>
                            </div>
                        </div>

                        <!-- Invoice Details -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Invoice Number</label>
                                <input type="text" id="invoiceNumber" required class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-100">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Invoice Date</label>
                                <input type="date" id="invoiceDate" required class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-100">
                            </div>
                        </div>

                        <!-- Items List -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Line Items</h3>
                                <button type="button" id="addItem" class="text-xs font-bold text-indigo-600 hover:text-indigo-700">+ Add Row</button>
                            </div>
                            <div id="itemsContainer" class="space-y-3">
                                <!-- Dynamic Items will go here -->
                            </div>
                        </div>

                        <!-- Footer/Totals -->
                        <div class="pt-6 border-t border-slate-100 flex flex-col md:flex-row justify-between gap-6">
                            <div class="w-full md:w-1/3">
                                <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Tax Rate (%)</label>
                                <input type="number" id="taxRate" step="0.01" value="0" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-100">
                            </div>
                            <div class="w-full md:w-1/2 bg-slate-50 p-6 rounded-2xl space-y-2">
                                <div class="flex justify-between text-sm text-slate-500">
                                    <span>Subtotal</span>
                                    <span id="subtotalDisplay">$0.00</span>
                                </div>
                                <div class="flex justify-between text-sm text-slate-500">
                                    <span>Tax</span>
                                    <span id="taxDisplay">$0.00</span>
                                </div>
                                <div class="flex justify-between text-lg font-bold text-slate-900 pt-2 border-t border-slate-200">
                                    <span>Total Amount</span>
                                    <span id="totalDisplay" class="text-indigo-600">$0.00</span>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                            Generate & Save Invoice
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Column -->
            <div class="lg:col-span-5">
                <h2 class="text-xl font-bold mb-6">Saved Invoices</h2>
                <div id="savedInvoicesList" class="space-y-4">
                    <!-- Loading State -->
                    <div class="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200">
                        <p class="text-slate-400">Loading records...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Detailed View/Print Preview (Hidden by default) -->
    <div id="printPreview" class="hidden fixed inset-0 z-[100] overflow-y-auto bg-white p-4 md:p-20">
        <div class="max-w-4xl mx-auto bg-white p-8 md:p-12 border border-slate-100 shadow-2xl rounded-3xl no-print mb-10">
            <div class="flex justify-between items-center mb-8">
                <button onclick="closePreview()" class="text-slate-400 hover:text-slate-600 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Generator
                </button>
                <button onclick="window.print()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-colors flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Print or PDF
                </button>
            </div>
            <div id="previewContent"></div>
        </div>
        <!-- This div is what actually gets printed -->
        <div class="print-only hidden" id="actualPrintable"></div>
    </div>

    <script>
        // UI State
        const itemsContainer = document.getElementById('itemsContainer');
        const invoiceForm = document.getElementById('invoiceForm');

        // Add Initial Item Row
        function createItemRow(desc = '', qty = 1, price = 0) {
            const row = document.createElement('div');
            row.className = 'grid grid-cols-12 gap-3 items-center item-row';
            row.innerHTML = `
                <div class="col-span-6">
                    <input type="text" placeholder="Description" class="item-desc w-full px-4 py-2 rounded-xl border border-slate-200 outline-none text-sm focus:ring-2 focus:ring-indigo-100" value="${desc}" required>
                </div>
                <div class="col-span-2">
                    <input type="number" placeholder="Qty" class="item-qty w-full px-2 py-2 rounded-xl border border-slate-200 outline-none text-sm text-center focus:ring-2 focus:ring-indigo-100" value="${qty}" min="1" required>
                </div>
                <div class="col-span-3">
                    <input type="number" placeholder="Price" class="item-price w-full px-2 py-2 rounded-xl border border-slate-200 outline-none text-sm text-right focus:ring-2 focus:ring-indigo-100" value="${price}" step="0.01" required>
                </div>
                <div class="col-span-1 text-right">
                    <button type="button" class="remove-item text-red-400 hover:text-red-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `;

            row.querySelector('.remove-item').addEventListener('click', () => {
                row.remove();
                calculateTotals();
            });
            row.querySelectorAll('input').forEach(input => input.addEventListener('input', calculateTotals));

            itemsContainer.appendChild(row);
            calculateTotals();
        }

        document.getElementById('addItem').addEventListener('click', () => createItemRow());
        document.getElementById('taxRate').addEventListener('input', calculateTotals);

        // Initial row
        createItemRow();

        function calculateTotals() {
            let subtotal = 0;
            const rows = document.querySelectorAll('.item-row');
            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                subtotal += qty * price;
            });

            const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            const tax = subtotal * (taxRate / 100);
            const total = subtotal + tax;

            document.getElementById('subtotalDisplay').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('taxDisplay').innerText = `$${tax.toFixed(2)}`;
            document.getElementById('totalDisplay').innerText = `$${total.toFixed(2)}`;

            return { subtotal, tax, total, taxRate };
        }

        // Handle Submit
        invoiceForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const totals = calculateTotals();
            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                items.push({
                    description: row.querySelector('.item-desc').value,
                    quantity: parseFloat(row.querySelector('.item-qty').value),
                    price: parseFloat(row.querySelector('.item-price').value),
                    total: parseFloat(row.querySelector('.item-qty').value) * parseFloat(row.querySelector('.item-price').value)
                });
            });

            const invoiceData = {
                invoiceNumber: document.getElementById('invoiceNumber').value,
                invoiceDate: document.getElementById('invoiceDate').value,
                companyName: document.getElementById('companyName').value,
                companyAddress: document.getElementById('companyAddress').value,
                clientName: document.getElementById('clientName').value,
                clientAddress: document.getElementById('clientAddress').value,
                items: items,
                taxRate: totals.taxRate,
                subtotal: totals.subtotal,
                tax: totals.tax,
                total: totals.total
            };

            try {
                const response = await fetch('/api/invoices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(invoiceData)
                });

                const result = await response.json();
                if (response.ok) {
                    showPreview(result.invoice);
                    invoiceForm.reset();
                    itemsContainer.innerHTML = '';
                    createItemRow();
                    calculateTotals();
                    loadInvoices(); // Refresh the list
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error saving invoice: ' + error.message);
            }
        });

        async function loadInvoices() {
            try {
                const response = await fetch('/api/invoices');
                const invoices = await response.json();

                renderList(invoices);
                renderStats(invoices);
            } catch (error) {
                console.error('Error loading invoices:', error);
                document.getElementById('savedInvoicesList').innerHTML = `<div class="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200 text-red-500">Error loading invoices.</div>`;
            }
        }

        function renderStats(invoices) {
            const count = invoices.length;
            const revenue = invoices.reduce((sum, i) => sum + (i.total || 0), 0);
            document.getElementById('invoiceCount').innerText = count;
            document.getElementById('totalRevenue').innerText = `$${revenue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('avgInvoice').innerText = `$${(count ? revenue/count : 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function renderList(invoices) {
            const list = document.getElementById('savedInvoicesList');
            if (invoices.length === 0) {
                list.innerHTML = `<div class="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200 text-slate-400">No invoices yet.</div>`;
                return;
            }

            list.innerHTML = invoices.map(i => `
                <div class="bg-white p-5 rounded-2xl border border-slate-100 flex items-center justify-between group hover:shadow-lg transition-all">
                    <div>
                        <h4 class="font-bold text-slate-900">#${i.invoiceNumber}</h4>
                        <p class="text-xs text-slate-500">${i.clientName} • ${new Date(i.invoiceDate).toLocaleDateString()}</p>
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <div class="text-sm font-bold text-indigo-600">$${i.total?.toFixed(2)}</div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="previewInvoice('${i.invoiceNumber}')" class="p-2 bg-slate-50 text-slate-600 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                            <button onclick="deleteInvoice('${i.invoiceNumber}')" class="p-2 bg-slate-50 text-slate-400 rounded-lg hover:bg-red-50 hover:text-red-600 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function previewInvoice(invoiceNumber) {
            try {
                const response = await fetch(`/api/invoices/${invoiceNumber}`);
                const invoice = await response.json();
                if (response.ok) {
                    showPreview(invoice);
                } else {
                    alert('Error: ' + invoice.error);
                }
            } catch (error) {
                alert('Error loading invoice: ' + error.message);
            }
        }

        async function deleteInvoice(invoiceNumber) {
            if (confirm('Are you sure you want to delete this invoice?')) {
                try {
                    const response = await fetch(`/api/invoices/${invoiceNumber}`, {
                        method: 'DELETE'
                    });
                    const result = await response.json();
                    if (response.ok) {
                        loadInvoices(); // Refresh the list
                    } else {
                        alert('Error: ' + result.error);
                    }
                } catch (error) {
                    alert('Error deleting invoice: ' + error.message);
                }
            }
        }

        function showPreview(data) {
            const content = `
                <div class="flex justify-between items-start mb-12">
                    <div>
                        <div class="text-3xl font-black text-indigo-600 mb-2">INVOICE</div>
                        <div class="text-slate-500 font-medium tracking-widest text-sm">#${data.invoiceNumber}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-slate-900">${data.companyName}</div>
                        <div class="text-sm text-slate-500 whitespace-pre-line">${data.companyAddress}</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-12 mb-12">
                    <div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Billed To</div>
                        <div class="font-bold text-slate-900">${data.clientName}</div>
                        <div class="text-sm text-slate-500 whitespace-pre-line">${data.clientAddress}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Invoice Date</div>
                        <div class="text-slate-900 font-medium">${new Date(data.invoiceDate).toLocaleDateString(undefined, { dateStyle: 'long' })}</div>
                    </div>
                </div>

                <table class="w-full mb-12">
                    <thead>
                        <tr class="border-b-2 border-slate-100 text-left text-xs font-bold text-slate-400 uppercase tracking-widest">
                            <th class="py-4">Description</th>
                            <th class="py-4 text-center">Qty</th>
                            <th class="py-4 text-right">Price</th>
                            <th class="py-4 text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        ${data.items.map(item => `
                            <tr class="text-sm">
                                <td class="py-4 text-slate-700 font-medium">${item.description}</td>
                                <td class="py-4 text-center text-slate-500">${item.quantity}</td>
                                <td class="py-4 text-right text-slate-500">$${item.price.toFixed(2)}</td>
                                <td class="py-4 text-right text-slate-900 font-bold">$${item.total.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <div class="flex justify-end">
                    <div class="w-full md:w-1/3 space-y-3">
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-400 font-medium">Subtotal</span>
                            <span class="text-slate-900 font-bold">$${data.subtotal.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-400 font-medium">Tax (${data.taxRate}%)</span>
                            <span class="text-slate-900 font-bold">$${data.tax.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-xl pt-3 border-t-2 border-indigo-500">
                            <span class="text-slate-900 font-black">Total</span>
                            <span class="text-indigo-600 font-black">$${data.total.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('previewContent').innerHTML = content;
            document.getElementById('actualPrintable').innerHTML = content;
            document.getElementById('printPreview').classList.remove('hidden');
        }

        window.closePreview = () => {
            document.getElementById('printPreview').classList.add('hidden');
        }

        // Load invoices on page load
        loadInvoices();
    </script>

    <script>
        // Fetch and insert common navigation
        fetch('common.html')
            .then(response => response.text())
            .then(html => {
                document.body.insertAdjacentHTML('afterbegin', html);
                // Set active link
                const links = document.querySelectorAll('nav a');
                links.forEach(link => {
                    if (link.href.includes('invoice.html')) {
                        link.classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600', 'pb-1');
                        link.classList.remove('text-slate-500');
                    }
                });
            })
            .catch(error => console.error('Error loading navigation:', error));
    </script>
</body>
</html>
