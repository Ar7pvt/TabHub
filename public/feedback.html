<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>
<body class="text-slate-800">

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <!-- Stats Row -->
        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-xl text-blue-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Total Responses</p>
                    <h3 class="text-2xl font-bold" id="totalFeedback">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-amber-50 p-3 rounded-xl text-amber-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Average Rating</p>
                    <h3 class="text-2xl font-bold" id="avgRating">0.0 ★</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-green-50 p-3 rounded-xl text-green-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Recent Activity</p>
                    <h3 class="text-2xl font-bold" id="latestCategory">None</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Column -->
            <div class="lg:col-span-5">
                <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 sticky top-24">
                    <h2 class="text-2xl font-bold mb-2">Share Your Thoughts</h2>
                    <p class="text-slate-500 text-sm mb-8">We value your input to improve our services.</p>

                    <form id="feedbackForm" class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Name</label>
                                <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" placeholder="John Doe">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email</label>
                                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" placeholder="john@example.com">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Category</label>
                            <select id="category" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 fill=%22none%22 viewBox=%220%200%2020%2020%22%3E%3Cpath stroke=%22%236b7280%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%221.5%22 d=%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')">
                                <option value="">Select a category</option>
                                <option value="General">General Feedback</option>
                                <option value="Bug Report">Bug Report</option>
                                <option value="Feature Request">Feature Request</option>
                                <option value="Support">Support Inquiry</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Rating</label>
                            <div class="flex flex-row-reverse justify-end items-center gap-1 star-rating">
                                <input type="radio" id="star5" name="rating" value="5" class="hidden" required><label for="star5" class="text-3xl cursor-pointer text-slate-300 transition-colors">★</label>
                                <input type="radio" id="star4" name="rating" value="4" class="hidden"><label for="star4" class="text-3xl cursor-pointer text-slate-300 transition-colors">★</label>
                                <input type="radio" id="star3" name="rating" value="3" class="hidden"><label for="star3" class="text-3xl cursor-pointer text-slate-300 transition-colors">★</label>
                                <input type="radio" id="star2" name="rating" value="2" class="hidden"><label for="star2" class="text-3xl cursor-pointer text-slate-300 transition-colors">★</label>
                                <input type="radio" id="star1" name="rating" value="1" class="hidden"><label for="star1" class="text-3xl cursor-pointer text-slate-300 transition-colors">★</label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Subject</label>
                            <input type="text" id="subject" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" placeholder="Brief summary">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Message</label>
                            <textarea id="message" rows="4" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all resize-none" placeholder="Tell us more about your experience..."></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition-all transform active:scale-[0.98] shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                            <span>Submit Feedback</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Column -->
            <div class="lg:col-span-7">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        Recent Feedback
                        <span id="listCountBadge" class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded-full">0</span>
                    </h2>
                    <div class="text-sm text-slate-500" id="lastUpdated">Updated just now</div>
                </div>

                <div id="feedbackList" class="space-y-4">
                    <!-- Loading State -->
                    <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                        <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-slate-500">Connecting to feedback stream...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center px-4 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-bold mb-2">Thank You!</h3>
            <p class="text-slate-500 mb-8">Your feedback has been successfully submitted and recorded.</p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-colors">Continue</button>
        </div>
    </div>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await submitFeedback();
        });

        async function submitFeedback() {
            const submitBtn = document.getElementById('submitBtn');
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mr-2"></div> Sending...`;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const category = document.getElementById('category').value;
            const rating = document.querySelector('input[name="rating"]:checked')?.value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            const feedbackData = {
                name,
                email,
                category,
                rating: parseInt(rating),
                subject,
                message
            };

            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(feedbackData)
                });

                const result = await response.json();
                if (response.ok) {
                    document.getElementById('feedbackForm').reset();
                    showSuccessModal();
                    loadFeedback();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error submitting feedback: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        }

        function showSuccessModal() {
            const successModal = document.getElementById('successModal');
            successModal.classList.remove('hidden');
            successModal.classList.add('flex');
        }

        window.closeModal = () => {
            const successModal = document.getElementById('successModal');
            successModal.classList.add('hidden');
            successModal.classList.remove('flex');
        };

        const getCategoryColor = (cat) => {
            const colors = {
                'Bug Report': 'bg-red-100 text-red-700',
                'Feature Request': 'bg-purple-100 text-purple-700',
                'Support': 'bg-blue-100 text-blue-700',
                'General': 'bg-slate-100 text-slate-700',
                'Other': 'bg-amber-100 text-amber-700'
            };
            return colors[cat] || 'bg-slate-100 text-slate-700';
        };

        async function loadFeedback() {
            try {
                const response = await fetch('/api/feedback');
                const feedback = await response.json();

                updateStats(feedback);
                renderList(feedback);
                document.getElementById('lastUpdated').innerText = `Updated ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            } catch (error) {
                console.error('Error loading feedback:', error);
                document.getElementById('feedbackList').innerHTML = `<div class="p-8 text-center text-red-500">Error loading feedback. Please try again later.</div>`;
            }
        }

        function updateStats(feedback) {
            const count = feedback.length;
            document.getElementById('totalFeedback').innerText = count;
            document.getElementById('listCountBadge').innerText = count;

            if (count > 0) {
                const sum = feedback.reduce((acc, curr) => acc + (curr.rating || 0), 0);
                document.getElementById('avgRating').innerText = `${(sum / count).toFixed(1)} ★`;
                document.getElementById('latestCategory').innerText = feedback[0].category || 'General';
            } else {
                document.getElementById('avgRating').innerText = '0.0 ★';
                document.getElementById('latestCategory').innerText = 'None';
            }
        }

        function renderList(feedback) {
            const feedbackListDiv = document.getElementById('feedbackList');

            if (feedback.length === 0) {
                feedbackListDiv.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                        <p class="text-slate-400">No feedback entries yet. Be the first!</p>
                    </div>
                `;
                return;
            }

            feedbackListDiv.innerHTML = feedback.map(f => {
                const date = f.createdAt ? new Date(f.createdAt).toLocaleDateString() : 'Just now';
                const initial = f.name ? f.name.charAt(0).toUpperCase() : '?';

                return `
                    <div class="feedback-card glass p-6 rounded-2xl border border-slate-100 flex gap-4">
                        <div class="flex-shrink-0 w-12 h-12 bg-gradient-to-br from-indigo-500 to-violet-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-100">
                            ${initial}
                        </div>
                        <div class="flex-grow">
                            <div class="flex flex-wrap items-center justify-between mb-2">
                                <div>
                                    <h4 class="font-bold text-slate-900">${f.name}</h4>
                                    <div class="flex items-center gap-1 text-amber-400 text-sm">
                                        ${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}
                                        <span class="text-slate-400 text-xs ml-2 font-normal">${date}</span>
                                    </div>
                                </div>
                                <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md mt-1 sm:mt-0 ${getCategoryColor(f.category)}">
                                    ${f.category}
                                </span>
                            </div>
                            <h5 class="text-sm font-semibold mb-1 text-slate-800">${f.subject}</h5>
                            <p class="text-sm text-slate-600 leading-relaxed bg-slate-50/50 p-3 rounded-lg border border-slate-100">
                                ${f.message}
                            </p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load feedback on page load
        loadFeedback();
    </script>

    <script>
        // Fetch and insert common navigation
        fetch('common.html')
            .then(response => response.text())
            .then(html => {
                document.body.insertAdjacentHTML('afterbegin', html);
                // Set active link
                const links = document.querySelectorAll('nav a');
                links.forEach(link => {
                    if (link.href.includes('feedback.html')) {
                        link.classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600', 'pb-1');
                        link.classList.remove('text-slate-500');
                    }
                });
            })
            .catch(error => console.error('Error loading navigation:', error));
    </script>
</body>
</html>
